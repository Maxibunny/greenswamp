services:
  postgres:
    image: postgres:16
    container_name: lilymarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lily_market
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234567890
    ports:
      - "5433:5432"
    volumes:
      - lilymarket-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lily_market"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lilymarket-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:5157

      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=lily_market;Username=postgres;Password=1234567890

      Jwt__Key: LilyMarketSuperSecretDevelopmentKeyForJwtToken1234567890
      Jwt__Issuer: LilyMarket
      Jwt__Audience: LilyMarketClient
      Jwt__ExpireMinutes: 120

      Cors__AllowedOrigins__0: http://127.0.0.1:5500
      Cors__AllowedOrigins__1: http://localhost:5500
      Cors__AllowedOrigins__2: http://localhost:5157

      Auction__ClosingIntervalSeconds: 10
      Auction__EndingSoonNotificationMinutes: 5

      App__ApplyMigrationsOnStartup: "true"
    ports:
      - "5157:5157"
    volumes:
      - lilymarket-uploaded-files:/app/wwwroot/uploads

volumes:
  lilymarket-postgres-data:
  lilymarket-uploaded-files: