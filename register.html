<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Greenswamp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        swamp: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .swamp-bg {
            background-image: url('istockphoto-1464399789-1024x1024.jpg');
            background-repeat: repeat-x;
            background-size: auto 100%;
            background-position: center top;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-swamp-50 min-h-screen relative">
    <div class="fixed inset-0 swamp-bg -z-10"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-swamp-50/90 to-swamp-100/60 z-0"></div>

    <div class="relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
            <div class="text-center mb-16">
                <div class="flex items-center justify-center space-x-3 mb-6">
                    <img src="green-toad-logo.svg" alt="Greenswamp Logo" class="h-16 w-16">
                    <span class="text-4xl font-bold text-swamp-900">Greenswamp</span>
                </div>
                <p class="text-lg text-swamp-800">Join the pond community</p>
            </div>

            <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-8 sm:p-12 border border-swamp-100">
                <div id="message-box" class="hidden mb-6 rounded-xl px-4 py-3 text-sm font-semibold"></div>

                <form id="register-form" class="space-y-8">
                    <div class="space-y-2">
                        <label for="full-name-input" class="block text-base font-semibold text-swamp-900">Full Name</label>
                        <input id="full-name-input" type="text" required
                            class="mt-1 block w-full rounded-xl bg-white px-5 py-3.5
                                   border border-swamp-200 focus:border-swamp-400
                                   focus:ring-2 focus:ring-swamp-200 placeholder-slate-400
                                   text-slate-900 shadow-sm"
                            placeholder="Princess Toadstool">
                    </div>

                    <div class="space-y-2">
                        <label for="email-input" class="block text-base font-semibold text-swamp-900">Email</label>
                        <input id="email-input" type="email" required
                            class="mt-1 block w-full rounded-xl bg-white px-5 py-3.5
                                   border border-swamp-200 focus:border-swamp-400
                                   focus:ring-2 focus:ring-swamp-200 placeholder-slate-400
                                   text-slate-900 shadow-sm"
                            placeholder="you@example.com">
                    </div>

                    <div class="space-y-2">
                        <label for="password-input" class="block text-base font-semibold text-swamp-900">Password</label>
                        <input id="password-input" type="password" required
                            class="mt-1 block w-full rounded-xl bg-white px-5 py-3.5
                                   border border-swamp-200 focus:border-swamp-400
                                   focus:ring-2 focus:ring-swamp-200 placeholder-slate-400
                                   text-slate-900 shadow-sm"
                            placeholder="••••••••">
                        <p class="text-xs text-swamp-500 mt-1">Minimum 6 characters.</p>
                    </div>

                    <button id="submit-btn" type="submit"
                        class="w-full bg-gradient-to-br from-swamp-500 to-swamp-600 text-white
                               py-4 px-6 rounded-xl hover:from-swamp-600 hover:to-swamp-700
                               focus:ring-2 focus:ring-swamp-400 font-semibold
                               transition-all duration-200 shadow-lg">
                        Create Account
                    </button>

                    <p class="text-center text-swamp-700 mt-8">
                        Already have an account?
                        <a href="login.html" class="font-semibold text-swamp-800 hover:text-swamp-900 underline">
                            Log in here
                        </a>
                    </p>
                </form>
            </div>

            <div class="mt-16 text-center">
                <div class="flex items-center justify-center space-x-4 text-swamp-700">
                    <a href="privacy.html" class="hover:text-swamp-900 hover:underline">Privacy</a>
                    <span class="text-swamp-500">•</span>
                    <a href="tos.html" class="hover:text-swamp-900 hover:underline">Terms</a>
                    <span class="text-swamp-500">•</span>
                    <a href="contact.html" class="hover:text-swamp-900 hover:underline">Contact</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5157';

        const form = document.getElementById('register-form');
        const fullNameInput = document.getElementById('full-name-input');
        const emailInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const submitBtn = document.getElementById('submit-btn');
        const messageBox = document.getElementById('message-box');

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-200', 'bg-swamp-50', 'text-swamp-700', 'border-swamp-200');

            if (type === 'success') {
                messageBox.classList.add('bg-swamp-50', 'text-swamp-700', 'border', 'border-swamp-200');
            } else {
                messageBox.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
            }
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            submitBtn.textContent = isLoading ? 'Creating account...' : 'Create Account';
            submitBtn.classList.toggle('opacity-70', isLoading);
            submitBtn.classList.toggle('cursor-not-allowed', isLoading);
        }

        function saveAuth(authResponse) {
            localStorage.setItem('lilyToken', authResponse.token);
            localStorage.setItem('lilyUser', JSON.stringify(authResponse.user));

            sessionStorage.setItem('gsToken', authResponse.token);
            sessionStorage.setItem('gsUser', JSON.stringify({
                name: authResponse.user.fullName,
                email: authResponse.user.email
            }));
        }

        form.addEventListener('submit', async function (event) {
            event.preventDefault();

            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!fullName || !email || !password) {
                showMessage('Fill in all fields.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must contain at least 6 characters.', 'error');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        fullName,
                        email,
                        password
                    })
                });

                const data = await response.json().catch(() => null);

                if (!response.ok) {
                    showMessage(data?.message || 'Registration failed.', 'error');
                    return;
                }

                saveAuth(data);
                showMessage('Account created. Redirecting to Lily Market...', 'success');

                setTimeout(() => {
                    window.location.href = 'indiv/auction/auctions.html';
                }, 700);
            } catch (error) {
                console.error(error);
                showMessage('Cannot connect to API. Make sure backend is running on http://localhost:5157.', 'error');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>
</html>
